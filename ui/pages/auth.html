<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#6366F1">
  <title>Entrar · Norte</title>
  <link rel="stylesheet" href="../css/norte.css">
  <style>
    .pw-toggle {
      position: absolute; right: .75rem; top: 50%; transform: translateY(-50%);
      background: none; border: none; cursor: pointer; font-size: 1.1rem;
      color: #9CA3AF; padding: .2rem; line-height: 1;
    }
    .pw-wrap { position: relative; }
    .pw-wrap .input { padding-right: 2.8rem; }
  </style>
</head>
<body>
<div class="auth-page" id="app">

  <div style="width:100%;max-width:440px;">
    <!-- Logo -->
    <div style="text-align:center;margin-bottom:2rem;">
      <a href="index.html" style="display:inline-flex;align-items:center;gap:.5rem;text-decoration:none;color:var(--norte-500);">
        <span style="font-size:2.5rem;">🧭</span>
        <span style="font-size:2rem;font-weight:800;letter-spacing:-.03em;">Norte</span>
      </a>
      <p style="color:#6B7280;font-size:.9rem;margin:.5rem 0 0;">Finanças Pessoais Inteligentes</p>
    </div>

    <!-- Card -->
    <div class="auth-card">

      <!-- Tabs -->
      <div class="auth-tabs">
        <button class="auth-tab active" id="tab-login"    data-tab="login">Entrar</button>
        <button class="auth-tab"        id="tab-register" data-tab="register">Criar conta</button>
      </div>

      <!-- ── PAINEL LOGIN ── -->
      <div id="panel-login">
        <form id="form-login" novalidate>
          <div class="form-group" style="margin-bottom:1rem;">
            <label class="label" for="login-email">E-mail</label>
            <input id="login-email" name="email" type="email" class="input" placeholder="voce@email.com" autocomplete="email" required>
          </div>
          <div class="form-group" style="margin-bottom:.25rem;">
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:.35rem;">
              <label class="label" for="login-password" style="margin:0;">Senha</label>
              <button type="button" id="btn-forgot" style="font-size:.8rem;color:var(--norte-500);background:none;border:none;cursor:pointer;font-family:inherit;">Esqueci a senha</button>
            </div>
            <div class="pw-wrap">
              <input id="login-password" name="password" type="password" class="input" placeholder="••••••••••" autocomplete="current-password" required>
              <button type="button" class="pw-toggle" onclick="togglePwd('login-password',this)" aria-label="Mostrar senha">👁️</button>
            </div>
          </div>

          <!-- Campo 2FA (oculto) -->
          <div id="totp-field" style="display:none;margin-top:1rem;" class="form-group">
            <label class="label" for="login-totp">Código 2FA (Google Authenticator)</label>
            <input id="login-totp" name="totpCode" type="text" inputmode="numeric" maxlength="6"
                   class="input" style="text-align:center;font-size:1.5rem;letter-spacing:.5em;font-weight:700;" placeholder="000000">
          </div>

          <div id="login-error" class="alert alert-error" style="display:none;margin:1rem 0 0;"></div>

          <button type="submit" class="btn btn-primary btn-full btn-lg" style="margin-top:1.25rem;" id="btn-login">
            <span id="btn-login-text">Entrar</span>
          </button>
        </form>

        <div class="divider" style="margin:1.25rem 0;">ou continue com</div>

        <button id="btn-google" class="btn btn-full" style="border:1.5px solid #E5E7EB;background:#fff;color:#374151;gap:.65rem;padding:.65rem 1rem;font-size:.875rem;font-weight:600;">
          <svg width="18" height="18" viewBox="0 0 48 48" aria-hidden="true">
            <path fill="#FFC107" d="M43.6 20H24v8h11.3C33.7 33.2 29.3 36 24 36c-6.6 0-12-5.4-12-12s5.4-12 12-12c3.1 0 5.8 1.1 7.9 3l5.7-5.7C33.8 6.1 29.1 4 24 4 12.9 4 4 12.9 4 24s8.9 20 20 20c11 0 19.7-8 19.7-20 0-1.3-.1-2.7-.1-4z"/>
            <path fill="#FF3D00" d="M6.3 14.7l6.6 4.8C14.5 15.1 18.9 12 24 12c3.1 0 5.8 1.1 7.9 3l5.7-5.7C33.8 6.1 29.1 4 24 4c-7.7 0-14.3 4.4-17.7 10.7z"/>
            <path fill="#4CAF50" d="M24 44c5.2 0 9.8-1.8 13.4-4.7l-6.2-5.2C29.4 35.7 26.8 36 24 36c-5.2 0-9.6-2.8-11.3-7l-6.6 5.1C9.7 39.6 16.4 44 24 44z"/>
            <path fill="#1976D2" d="M43.6 20H24v8h11.3c-.8 2.2-2.3 4.1-4.2 5.4l6.2 5.2C40.8 35.6 44 30.2 44 24c0-1.3-.1-2.7-.4-4z"/>
          </svg>
          Continuar com Google
        </button>
      </div>

      <!-- ── PAINEL REGISTRO ── -->
      <div id="panel-register" style="display:none;">
        <form id="form-register" novalidate>
          <div style="display:flex;flex-direction:column;gap:.875rem;">
            <div class="form-group">
              <label class="label" for="reg-name">Nome completo</label>
              <input id="reg-name" name="name" type="text" class="input" placeholder="Seu nome" autocomplete="name" required>
            </div>
            <div class="form-group">
              <label class="label" for="reg-email">E-mail</label>
              <input id="reg-email" name="email" type="email" class="input" placeholder="voce@email.com" autocomplete="email" required>
            </div>
            <div class="form-group">
              <label class="label" for="reg-password">Senha</label>
              <div class="pw-wrap">
                <input id="reg-password" name="password" type="password" class="input" placeholder="Mínimo 10 caracteres" autocomplete="new-password" required minlength="10">
                <button type="button" class="pw-toggle" onclick="togglePwd('reg-password',this)" aria-label="Mostrar senha">👁️</button>
              </div>
              <div class="strength-bars" style="margin-top:.4rem;">
                <div class="strength-bar" id="str1"></div>
                <div class="strength-bar" id="str2"></div>
                <div class="strength-bar" id="str3"></div>
                <div class="strength-bar" id="str4"></div>
              </div>
              <p id="str-label" style="font-size:.75rem;color:#9CA3AF;margin:.2rem 0 0;">Mínimo 10 caracteres</p>
            </div>
            <div class="form-group">
              <label class="label" for="reg-confirm">Confirmar senha</label>
              <input id="reg-confirm" name="confirmPassword" type="password" class="input" placeholder="Repita a senha" required>
            </div>
            <label class="check-label">
              <input type="checkbox" name="isMEI">
              <div>
                <p style="font-size:.875rem;font-weight:600;margin:0;">Sou MEI / Tenho empresa</p>
                <p style="font-size:.78rem;color:#9CA3AF;margin:.2rem 0 0;">Ativa separação automática PF vs PJ</p>
              </div>
            </label>
            <label class="check-label">
              <input type="checkbox" name="terms" required>
              <span style="font-size:.8rem;color:#6B7280;">
                Li e aceito os <a href="#" style="color:var(--norte-500);">Termos de Uso</a> e a
                <a href="#" style="color:var(--norte-500);">Política de Privacidade (LGPD)</a>
              </span>
            </label>
            <div id="register-error" class="alert alert-error" style="display:none;"></div>
            <button type="submit" class="btn btn-primary btn-full btn-lg">Criar minha conta gratuita</button>
          </div>
        </form>
      </div>

      <!-- ── PAINEL RESET ── -->
      <div id="panel-reset" style="display:none;">
        <div style="text-align:center;margin-bottom:1.5rem;">
          <div style="font-size:2.5rem;margin-bottom:.5rem;">🔑</div>
          <h2 style="font-size:1.1rem;font-weight:700;margin:0;">Recuperar acesso</h2>
          <p style="font-size:.85rem;color:#6B7280;margin:.4rem 0 0;">Enviaremos um link de acesso para seu e-mail (válido por 30 min)</p>
        </div>
        <form id="form-reset" novalidate style="display:flex;flex-direction:column;gap:1rem;">
          <div class="form-group">
            <label class="label" for="reset-email">E-mail cadastrado</label>
            <input id="reset-email" name="email" type="email" class="input" placeholder="voce@email.com" required>
          </div>
          <div id="reset-msg" class="alert alert-success" style="display:none;text-align:center;"></div>
          <button type="submit" class="btn btn-primary btn-full btn-lg">Enviar link de acesso</button>
          <button type="button" id="btn-back-login" class="btn btn-ghost btn-full">← Voltar ao login</button>
        </form>
      </div>

    </div><!-- /auth-card -->
  </div><!-- /max-width -->
</div><!-- /auth-page -->

<script>
// ── Utilitários ────────────────────────────────────────────
const $ = id => document.getElementById(id);
const show = id => { const el=$(id); if(el) el.style.display=''; };
const hide = id => { const el=$(id); if(el) el.style.display='none'; };
const showErr = (id, msg) => { const el=$(id); if(!el) return; el.textContent=msg; el.style.display='flex'; };
const hideErr = id => { const el=$(id); if(el) el.style.display='none'; };

const togglePwd = (id, btn) => {
  const inp = $(id);
  inp.type = inp.type === 'password' ? 'text' : 'password';
  btn.textContent = inp.type === 'password' ? '👁️' : '🙈';
};

// ── Tabs ───────────────────────────────────────────────────
document.querySelectorAll('.auth-tab').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.auth-tab').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    hide('panel-login'); hide('panel-register'); hide('panel-reset');
    show(`panel-${btn.dataset.tab}`);
  });
});

$('btn-forgot').addEventListener('click', () => {
  hide('panel-login'); hide('panel-register');
  show('panel-reset');
  document.querySelectorAll('.auth-tab').forEach(b => b.classList.remove('active'));
});
$('btn-back-login').addEventListener('click', () => {
  hide('panel-reset');
  show('panel-login');
  $('tab-login').classList.add('active');
  $('tab-register').classList.remove('active');
});

// ── Força da senha ─────────────────────────────────────────
const calcStrength = p => {
  let s = 0;
  if (p.length >= 10) s++;
  if (p.length >= 14) s++;
  if (/[A-Z]/.test(p) && /[a-z]/.test(p)) s++;
  if (/[0-9]/.test(p)) s++;
  if (/[^A-Za-z0-9]/.test(p)) s++;
  return Math.min(4, s);
};
const LABELS  = ['','Fraca','Regular','Boa','Forte 💪'];
const COLORS  = ['','active-1','active-2','active-3','active-4'];
const CLR_TXT = ['','#EF4444','#F97316','#3B82F6','#22C55E'];

$('reg-password').addEventListener('input', function() {
  const s = calcStrength(this.value);
  for (let i = 1; i <= 4; i++) {
    const b = $(`str${i}`);
    b.className = 'strength-bar' + (i <= s ? ' ' + COLORS[s] : '');
  }
  const lbl = $('str-label');
  lbl.textContent = this.value ? LABELS[s] : 'Mínimo 10 caracteres';
  lbl.style.color = this.value ? CLR_TXT[s] : '#9CA3AF';
});

// ── Login ──────────────────────────────────────────────────
$('form-login').addEventListener('submit', async e => {
  e.preventDefault();
  hideErr('login-error');
  const fd = new FormData(e.target);
  const { email, password, totpCode } = Object.fromEntries(fd.entries());
  if (!email || !password) { showErr('login-error','Preencha e-mail e senha'); return; }
  const btn = $('btn-login');
  btn.disabled = true;
  $('btn-login-text').innerHTML = '<span class="spinner"></span>';
  try {
    await new Promise(r => setTimeout(r, 700));
    window.location.href = 'index.html';
  } catch {
    showErr('login-error','Erro ao conectar. Tente novamente.');
  } finally {
    btn.disabled = false;
    $('btn-login-text').textContent = 'Entrar';
  }
});

// ── Registro ───────────────────────────────────────────────
$('form-register').addEventListener('submit', async e => {
  e.preventDefault();
  hideErr('register-error');
  const fd = new FormData(e.target);
  const d = Object.fromEntries(fd.entries());
  if (!d.name?.trim())            { showErr('register-error','Informe seu nome'); return; }
  if (!d.email?.includes('@'))    { showErr('register-error','E-mail inválido'); return; }
  if (d.password.length < 10)    { showErr('register-error','Senha deve ter no mínimo 10 caracteres'); return; }
  if (d.password !== d.confirmPassword) { showErr('register-error','As senhas não coincidem'); return; }
  if (!d.terms)                   { showErr('register-error','Aceite os termos para continuar'); return; }
  await new Promise(r => setTimeout(r, 700));
  window.location.href = 'index.html';
});

// ── Reset ──────────────────────────────────────────────────
$('form-reset').addEventListener('submit', async e => {
  e.preventDefault();
  const email = $('reset-email').value;
  if (!email) return;
  await new Promise(r => setTimeout(r, 600));
  const msg = $('reset-msg');
  msg.textContent = '✅ Link enviado! Verifique seu e-mail.';
  msg.style.display = 'flex';
});

$('btn-google').addEventListener('click', () => { window.location.href = 'index.html'; });

// ── Tema ───────────────────────────────────────────────────
if (localStorage.getItem('norte-theme') === 'dark' ||
    (!localStorage.getItem('norte-theme') && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
  document.body.classList.add('dark');
}
</script>
</body>
</html>
